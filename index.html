<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/><title>Frame A Farm</title><style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#2ECC71;--amber:#F39C12;--panel:rgba(8,8,8,0.80);--border:rgba(46,204,113,0.30);--dim:rgba(240,240,240,0.50)}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Segoe UI',sans-serif;color:#f0f0f0}
#page1{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:linear-gradient(160deg,#001f12 0%,#003d24 50%,#002d1a 100%);text-align:center;padding:2rem;}
#page1 img.logo{width:160px;height:160px;border-radius:22px;margin-bottom:1.5rem;object-fit:cover;}
#page1 h1{font-size:2.6rem;font-weight:800;letter-spacing:0.05em;margin-bottom:0.5rem;}
#page1 .sub{font-size:0.78rem;color:rgba(255,255,255,0.5);letter-spacing:0.18em;text-transform:uppercase;margin-bottom:2.5rem;}
.btn-scan{background:#F5C518;color:#1a3a0a;font-weight:700;font-size:1.05rem;padding:1rem 2.8rem;border:none;border-radius:50px;cursor:pointer;box-shadow:0 0 30px rgba(245,197,24,0.4);}
#page2{display:none;position:fixed;inset:0;width:100vw;height:100vh;background:#000;}
#vid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;}
#cv{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2;}
#hud{position:absolute;top:16px;right:14px;width:195px;background:rgba(0,20,10,0.85);border:1px solid rgba(46,204,113,0.25);border-radius:10px;padding:14px;z-index:3;}
.ht{font-size:9px;letter-spacing:0.2em;color:#2ECC71;text-transform:uppercase;margin-bottom:10px;font-weight:600;}
.hr{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.hr:last-child{border-bottom:none;}
.hl{font-size:10px;color:rgba(255,255,255,0.4);}
.hv{font-size:10px;font-weight:700;}
.hv.g{color:#2ECC71;}.hv.a{color:#F39C12;}
#cropbox{margin-top:8px;padding:8px;background:rgba(46,204,113,0.08);border:1px solid rgba(46,204,113,0.2);border-radius:6px;text-align:center;}
.cl{font-size:7px;letter-spacing:0.14em;color:#2ECC71;text-transform:uppercase;}
.cn{font-size:15px;font-weight:700;}
#back-btn{position:absolute;top:16px;left:14px;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.15);color:#fff;padding:8px 14px;border-radius:20px;font-size:12px;cursor:pointer;z-index:3;}
#controls{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:10px;z-index:3;}
#camSel{background:rgba(0,0,0,0.75);color:#fff;border:1px solid rgba(46,204,113,0.4);border-radius:8px;padding:7px 14px;font-size:13px;min-width:220px;}
#scan-btn{background:#F5C518;color:#1a3a0a;font-weight:700;font-size:1rem;padding:13px 42px;border:none;border-radius:50px;cursor:pointer;box-shadow:0 0 20px rgba(245,197,24,0.35);}
#scan-btn:disabled{background:rgba(245,197,24,0.3);color:rgba(0,0,0,0.4);box-shadow:none;}
#dist-bar{position:absolute;bottom:160px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);border:1px solid rgba(243,156,18,0.3);border-radius:8px;padding:6px 16px;font-size:11px;color:#F39C12;display:none;white-space:nowrap;z-index:3;}
#spinner{position:absolute;inset:0;background:rgba(0,0,0,0.5);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:5;}
#spinner.on{display:flex;}
.ring{width:48px;height:48px;border:3px solid rgba(46,204,113,0.2);border-top-color:#2ECC71;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin-txt{font-size:11px;color:#2ECC71;letter-spacing:0.12em;}
</style></head><body>

let currentCrop='Corn';
const imgCache={};
function getImg(crop){
  if(!imgCache[crop]){
    const i=new Image();
    i.src=PLANT_IMGS[crop]||PLANT_IMGS['Rice'];
    imgCache[crop]=i;
  }
  return imgCache[crop];
}
// Preload all
Object.keys(PLANT_IMGS).forEach(getImg);

const vid=document.getElementById('vid');
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
let stream=null, scanning=false;
let gridPoints=[], frameW=1280, frameH=720, lastDepth='2cm';

function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();

async function init(){
  document.getElementById('page1').style.display='none';
  document.getElementById('page2').style.display='block';
  try{
    const tmp=await navigator.mediaDevices.getUserMedia({video:true,audio:false});
    tmp.getTracks().forEach(t=>t.stop());
  }catch(e){alert('Camera permission denied');return;}
  await populateCams();
  startCam(document.getElementById('camSel').value);
}

async function populateCams(){
  const devices=await navigator.mediaDevices.enumerateDevices();
  const sel=document.getElementById('camSel');
  const cur=sel.value;
  sel.innerHTML='';
  devices.filter(d=>d.kind==='videoinput').forEach((d,i)=>{
    const o=document.createElement('option');
    o.value=d.deviceId;
    o.textContent=d.label||'Camera '+(i+1);
    if(d.deviceId===cur)o.selected=true;
    sel.appendChild(o);
  });
}

async function startCam(id){
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  try{
    const vc=id?{deviceId:{exact:id}}:{facingMode:{ideal:'environment'}};
    stream=await navigator.mediaDevices.getUserMedia({video:vc,audio:false});
    vid.srcObject=stream;
    vid.play().catch(()=>{});
  }catch(e){alert('Camera error: '+e.message);}
}

function switchCam(id){startCam(id);}

function goBack(){
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  vid.srcObject=null;
  document.getElementById('page2').style.display='none';
  document.getElementById('page1').style.display='flex';
  ctx.clearRect(0,0,cv.width,cv.height);
  gridPoints=[];
}

function capture(){
  const o=document.createElement('canvas');
  o.width=1280;o.height=720;
  o.getContext('2d').drawImage(vid,0,0,1280,720);
  return o.toDataURL('image/jpeg',0.8);
}

function removeBg(img){
  const tmp=document.createElement('canvas');
  tmp.width=img.naturalWidth;tmp.height=img.naturalHeight;
  const tc=tmp.getContext('2d');
  tc.drawImage(img,0,0);
  const id=tc.getImageData(0,0,tmp.width,tmp.height);
  const d=id.data;
  for(let j=0;j<d.length;j+=4){
    if(d[j]<40&&d[j+1]<40&&d[j+2]<40) d[j+3]=0;
  }
  tc.putImageData(id,0,0);
  return tmp;
}

function drawPlants(){
  ctx.clearRect(0,0,cv.width,cv.height);
  if(!gridPoints.length)return;
  const sx=cv.width/frameW, sy=cv.height/frameH;
  const img=getImg(currentCrop);
  if(!img.complete||!img.naturalWidth)return;
  const cleaned=removeBg(img);
  const size=currentCrop==='Apple'?280:180;
  gridPoints.forEach((pt,i)=>{
    const x=pt[0]*sx, y=pt[1]*sy;
    ctx.drawImage(cleaned, x-size/2, y-size, size, size);
  });
  // Distance label
  const db=document.getElementById('dist-bar');
  if(db.style.display==='block'){}
}

function animatePlants(pts){
  gridPoints=[];let i=0;
  const iv=setInterval(()=>{
    if(i>=pts.length){clearInterval(iv);return;}
    gridPoints.push(pts[i++]);
    drawPlants();
  },20);
}

function set(id,v){const el=document.getElementById(id);if(el)el.textContent=v;}

function updateHUD(d){
  const ns=!d.crop||d.crop==='No Crop'||d.soil_type==='None';
  set('h-soil',ns?'—':d.soil_type||'—');
  set('h-moist',ns?'—':d.moisture||'—');
  set('h-temp',ns?'—':d.temperature?d.temperature+'°C':'—');
  set('h-org',ns?'—':d.organic_matter||'—');
  set('h-space',ns?'—':d.spacing||'—');
  set('h-depth',ns?'—':d.depth||'—');
  set('h-crop',ns?'No Soil':d.crop||'—');
  if(!ns&&d.crop) currentCrop=d.crop;
  const db=document.getElementById('dist-bar');
  if(d.notes&&!ns){
    const m=d.notes.match(/Distance:[^|]*/);
    if(m){db.textContent=m[0].trim();db.style.display='block';}
    else db.style.display='none';
  }else db.style.display='none';
}

async function scan(){
  if(scanning)return;
  scanning=true;
  const btn=document.getElementById('scan-btn');
  const sp=document.getElementById('spinner');
  btn.disabled=true;sp.classList.add('on');
  try{
    const r=await fetch(BACKEND+'/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({frame:capture()})});
    if(!r.ok)throw new Error('Server '+r.status);
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    frameW=d.frame_w||1280;frameH=d.frame_h||720;lastDepth=d.depth||'2cm';
    updateHUD(d);animatePlants(d.grid_points||[]);
  }catch(e){alert('Error: '+e.message);}
  finally{sp.classList.remove('on');btn.disabled=false;scanning=false;}
}
</script></body></html>
